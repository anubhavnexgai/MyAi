version: "3.8"

services:
  myai:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./app/workspace:/app/app/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - HOST=0.0.0.0
      - PORT=8001
    restart: unless-stopped

  # Optional: Expose via ngrok for mobile/remote access
  # ngrok:
  #   image: ngrok/ngrok:latest
  #   command: http myai:8001
  #   environment:
  #     - NGROK_AUTHTOKEN=your-ngrok-auth-token
  #   ports:
  #     - "4040:4040"
  #   depends_on:
  #     - myai
